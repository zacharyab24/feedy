<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
</head>

<body class="bg-gray-900 text-gray-100 h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-800 p-4 flex flex-col gap-4 overflow-y-auto">
        <h1 class="text-xl font-bold">Feedy</h1>
        {{template "add_feed" .}}
        <button hx-post="/feeds/refresh" hx-target="#item-list"
            class="bg-blue-600 rounded px-3 py-2 text-sm hover:bg-blue-700">
            Refresh All
        </button>
        <nav>
            {{template "feed_list" .}}
        </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-6">
        <div id="item-list">
            {{template "item_list" .}}
        </div>
    </main>

</body>

</html>
