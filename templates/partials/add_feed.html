{{define "add_feed"}}
<form hx-post="/feeds" hx-target="nav" hx-on::after-request="this.reset()" method="post">
    <input type="text" name="url" placeholder="Enter feed URL" required
        class="bg-gray-700 text-gray-100 border-gray-600">
    <button type="submit">Add Feed</button>
</form>
{{end}}
